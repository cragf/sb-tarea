spring:
  datasource:
    url: jdbc:h2:mem:empleadosdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  h2:
    console:
      enabled: true
      path: /h2-console
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
server:
  port: 8080
