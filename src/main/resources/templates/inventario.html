<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-4">
        <h1>Lista de Inventario</h1>
        <a href="/inventario/nuevo" class="btn btn-primary mb-3">Nuevo Producto</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th>Proveedor</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ">
                    <td th:text=""></td>
                    <td th:text=""></td>
                    <td th:text=""></td>
                    <td th:text=""></td>
                    <td th:text="'$' + "></td>
                    <td th:text=""></td>
                    <td th:text=" ? 'Activo' : 'Inactivo'"></td>
                    <td>
                        <a class="btn btn-warning btn-sm" th:href="'/inventario/editar/' + ">Editar</a>
                        <a class="btn btn-danger btn-sm" th:href="'/inventario/eliminar/' + " onclick="return confirm('Eliminar?')">Eliminar</a>
                        <a th:if="" class="btn btn-secondary btn-sm" th:href="'/inventario/desactivar/' + ">Desactivar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
