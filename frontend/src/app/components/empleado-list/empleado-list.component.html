<div class="container mt-4">
  <h2>Listado de Empleados</h2>
  
  <!-- Alertas -->
  <div *ngIf="mensaje" class="alert alert-success alert-dismissible fade show" role="alert">
    {{ mensaje }}
    <button type="button" class="btn-close" (click)="cerrarAlerta()"></button>
  </div>
  
  <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{ error }}
    <button type="button" class="btn-close" (click)="cerrarAlerta()"></button>
  </div>
  
  <!-- Botón Nuevo -->
  <a routerLink="/empleados/nuevo" class="btn btn-success mb-3">
    <i class="bi bi-plus-circle"></i> Nuevo Empleado
  </a>
  
  <!-- Tabla -->
  <table class="table table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Departamento</th>
        <th>Puesto</th>
        <th>Salario</th>
        <th>Correo</th>
        <th>Activo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let empleado of empleados">
        <td>{{ empleado.idEmpleado }}</td>
        <td>{{ empleado.nombre }}</td>
        <td>{{ empleado.departamento }}</td>
        <td>{{ empleado.puesto }}</td>
        <td>${{ empleado.salario }}</td>
        <td>{{ empleado.correo }}</td>
        <td>
          <span class="badge" [class.bg-success]="empleado.activo === 'Sí'" [class.bg-danger]="empleado.activo === 'No'">
            {{ empleado.activo }}
          </span>
        </td>
        <td>
          <a [routerLink]="['/empleados/editar', empleado.idEmpleado]" class="btn btn-warning btn-sm me-1">
            <i class="bi bi-pencil"></i>
          </a>
          <button (click)="eliminar(empleado.idEmpleado!)" class="btn btn-danger btn-sm">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
