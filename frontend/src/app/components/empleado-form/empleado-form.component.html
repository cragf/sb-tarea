<div class="container mt-4">
  <h2>{{ isEditMode ? 'Editar' : 'Agregar' }} Empleado</h2>
  
  <!-- Alertas -->
  <div *ngIf="mensaje" class="alert alert-success alert-dismissible fade show" role="alert">
    {{ mensaje }}
    <button type="button" class="btn-close" (click)="cerrarAlerta()"></button>
  </div>
  
  <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{ error }}
    <button type="button" class="btn-close" (click)="cerrarAlerta()"></button>
  </div>
  
  <div class="card">
    <div class="card-body">
      <form (ngSubmit)="guardar()">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre:</label>
          <input type="text" class="form-control" id="nombre" [(ngModel)]="empleado.nombre" name="nombre" required>
        </div>
        
        <div class="mb-3">
          <label for="departamento" class="form-label">Departamento:</label>
          <input type="text" class="form-control" id="departamento" [(ngModel)]="empleado.departamento" name="departamento" required>
        </div>
        
        <div class="mb-3">
          <label for="puesto" class="form-label">Puesto:</label>
          <input type="text" class="form-control" id="puesto" [(ngModel)]="empleado.puesto" name="puesto" required>
        </div>
        
        <div class="mb-3">
          <label for="salario" class="form-label">Salario:</label>
          <input type="number" step="0.01" class="form-control" id="salario" [(ngModel)]="empleado.salario" name="salario" required>
        </div>
        
        <div class="mb-3">
          <label for="correo" class="form-label">Correo:</label>
          <input type="email" class="form-control" id="correo" [(ngModel)]="empleado.correo" name="correo">
        </div>
        
        <div class="mb-3">
          <label for="activo" class="form-label">Activo:</label>
          <select class="form-select" id="activo" [(ngModel)]="empleado.activo" name="activo">
            <option value="Sí">Sí</option>
            <option value="No">No</option>
          </select>
        </div>
        
        <button type="submit" class="btn btn-primary">Guardar</button>
        <button type="button" class="btn btn-secondary ms-2" (click)="cancelar()">Cancelar</button>
      </form>
    </div>
  </div>
</div>
